<!DOCTYPE html>
<html lang="ar" dir="rtl" class="font-sans antialiased">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Clinic - Treatment Modal Replica</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Cairo', 'sans-serif'] },
                    colors: {
                        primary: '#0ea5e9', // Sky 500
                        secondary: '#64748b', // Slate 500
                    }
                }
            }
        }
    </script>
    <style>
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }

        body {
            background-color: #f1f5f9;
        }
    </style>
</head>

<body class="flex items-center justify-center min-h-screen p-4 bg-gray-200">

    <!-- OPEN BUTTON -->
    <button onclick="openModal()"
        class="px-6 py-3 bg-white text-slate-800 font-bold rounded-xl shadow hover:shadow-lg transition-all transform hover:-translate-y-1">
        📄 فتح نافذة العلاج
    </button>

    <!-- BACKDROP & MODAL -->
    <div id="modal-backdrop"
        class="fixed inset-0 bg-black/50 z-50 hidden flex items-center justify-center p-4 backdrop-blur-sm transition-opacity duration-300 opacity-0">

        <!-- MODAL CONTAINER -->
        <div id="modal-content"
            class="bg-white w-full max-w-md rounded-2xl p-6 shadow-2xl max-h-[95vh] overflow-y-auto transform scale-95 transition-transform duration-300">

            <!-- HEADER -->
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-xl font-bold text-slate-800">تفاصيل السن رقم #UL6</h3>
                <button onclick="closeModal()"
                    class="p-1 hover:bg-slate-100 rounded-full text-slate-500 transition-colors">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>

            <div class="space-y-4">

                <!-- TABS CONTAINER -->
                <div class="bg-white rounded-2xl border border-slate-100 p-4 shadow-sm mb-4">
                    <!-- Tabs Header -->
                    <div class="flex p-1 bg-slate-100/80 rounded-xl mb-6 relative">
                        <button
                            class="flex-1 py-2 text-sm font-bold rounded-lg transition-all z-10 bg-white text-slate-900 shadow-sm">العامة</button>
                        <button
                            class="flex-1 py-2 text-sm font-bold rounded-lg transition-all z-10 text-slate-500 hover:text-slate-700">الأمراض</button>
                        <button
                            class="flex-1 py-2 text-sm font-bold rounded-lg transition-all z-10 text-slate-500 hover:text-slate-700">التركيبات</button>
                    </div>

                    <!-- Tabs Content -->
                    <div class="min-h-[60px]">
                        <!-- General Tab -->
                        <div id="tab-general" class="flex flex-wrap gap-2 animate-in fade-in zoom-in-95">
                            <button
                                class="px-4 py-2 rounded-full text-sm font-bold border bg-slate-800 text-white border-slate-800 shadow-md transform scale-105">Healthy</button>
                            <button
                                class="px-4 py-2 rounded-full text-sm font-bold border bg-white text-slate-600 border-slate-200 hover:bg-slate-50">Impacted</button>
                        </div>
                    </div>
                </div>

                <!-- DIAGNOSIS INPUT -->
                <input type="text" value="Healthy"
                    class="w-full p-3 bg-slate-50 rounded-xl outline-none border border-transparent focus:border-slate-200 transition-colors text-slate-700 font-medium"
                    placeholder="التشخيص">

                <!-- PROCEDURE SECTION -->
                <div class="bg-slate-50 p-4 rounded-xl space-y-4 border border-slate-100">
                    <div class="flex items-center justify-between text-xs text-slate-500 mb-1 font-bold">
                        <span>قائمة الأسعار:</span>
                        <span class="text-primary cursor-pointer hover:underline">الافتراضية (2025)</span>
                    </div>

                    <div class="relative">
                        <select id="procedure-select" onchange="handleProcedureChange()"
                            class="w-full p-3 bg-white border border-slate-200 rounded-xl outline-none appearance-none cursor-pointer font-bold text-slate-700 focus:border-primary focus:ring-1 focus:ring-primary/20 transition-all">
                            <option value="">اختر الإجراء العلاجي...</option>
                            <option value="rct">علاج جذور (Root Canal)</option>
                            <option value="composite">حشو كمبوزيت (Composite)</option>
                            <option value="extraction">خلع (Extraction)</option>
                        </select>
                        <div
                            class="absolute left-3 top-1/2 transform -translate-y-1/2 pointer-events-none text-slate-400">
                            <i data-lucide="chevron-down" class="w-5 h-5"></i>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="text-xs font-bold text-slate-400 block mb-1">التكلفة (ج.م)</label>
                            <input type="number" id="cost-input" value="0.00"
                                class="w-full p-3 bg-white border border-slate-200 rounded-xl outline-none font-bold text-slate-800">
                        </div>
                        <div>
                            <label class="text-xs font-bold text-slate-400 block mb-1">الخصم</label>
                            <input type="number" value="0.00"
                                class="w-full p-3 bg-white border border-slate-200 border-dashed rounded-xl outline-none text-slate-600">
                        </div>
                    </div>
                </div>

                <!-- NEW INVENTORY SECTION -->
                <div id="inventory-section" class="hidden animate-in slide-in-from-top-2 duration-300">
                    <div class="bg-blue-50/50 p-4 rounded-xl border border-blue-100 space-y-3">
                        <div class="flex justify-between items-center">
                            <h4 class="text-sm font-bold text-blue-900 flex items-center gap-2">
                                <i data-lucide="package-check" class="w-4 h-4 text-blue-500"></i>
                                المواد المستهلكة
                            </h4>
                            <span
                                class="text-[10px] text-blue-400 border border-blue-200 px-2 py-0.5 rounded-full bg-white">تخصيم
                                تلقائي</span>
                        </div>

                        <!-- Dynamic Materials List -->
                        <div id="materials-list" class="space-y-2 max-h-56 overflow-y-auto pr-1 custom-scroll">
                            <!-- Items injected by JS -->
                        </div>

                        <!-- Manual Add Button -->
                        <div class="pt-2 border-t border-blue-100">
                            <button onclick="toggleManualAdd()"
                                class="text-xs font-bold text-blue-600 hover:text-blue-800 flex items-center gap-1">
                                <i data-lucide="plus-circle" class="w-4 h-4"></i>
                                إضافة خامة يدوياً
                            </button>

                            <!-- Manual Add Logic (Hidden Initially) -->
                            <div id="manual-add-row" class="hidden mt-2 flex gap-2 animate-in slide-in-from-top-1">
                                <select id="manual-item-select"
                                    class="flex-1 p-2 text-xs border border-slate-200 rounded">
                                    <option value="">اختر خامة...</option>
                                    <option value="Etch 37%">Etch 37%</option>
                                    <option value="Matrix Band (L)">Matrix Band (L)</option>
                                    <option value="Matrix Band (S)">Matrix Band (S)</option>
                                    <option value="Wedge (Yellow)">Wedge (Yellow)</option>
                                    <option value="Wedge (Blue)">Wedge (Blue)</option>
                                </select>
                                <button onclick="addManualItem()"
                                    class="px-3 bg-blue-500 text-white rounded text-xs font-bold">إضافة</button>
                            </div>
                        </div>

                        <!-- Stock Alert -->
                        <div id="stock-alert"
                            class="hidden text-xs bg-amber-50 text-amber-600 p-2 rounded-lg border border-amber-100 flex items-center gap-2">
                            <i data-lucide="alert-triangle" class="w-4 h-4"></i>
                            <span>تنبيه: مخزون البنج منخفض في هذه العيادة.</span>
                        </div>
                    </div>
                </div>

                <!-- TOOTH NUMBER (READONLY) -->
                <div class="flex justify-end">
                    <span class="text-xs font-bold text-slate-400 bg-slate-100 px-2 py-1 rounded">UL6</span>
                </div>

                <!-- ADD DETAILS BUTTON -->
                <button
                    class="w-full py-2 text-sm text-primary font-bold border border-primary/20 rounded-xl hover:bg-primary/5 transition-colors flex items-center justify-center gap-2">
                    <i data-lucide="plus" class="w-4 h-4"></i>
                    إضافة تفاصيل (عصب، قنوات)
                </button>

                <!-- NOTES -->
                <textarea placeholder="ملاحظات عامة"
                    class="w-full p-3 bg-slate-50 rounded-xl outline-none border border-transparent focus:border-slate-200 min-h-[80px] text-sm text-slate-700"></textarea>

                <!-- FOOTER ACTIONS -->
                <div class="flex justify-end gap-3 text-lg font-bold border-t border-slate-100 pt-4 mt-2">
                    <button onclick="closeModal()"
                        class="px-4 py-2 text-slate-500 hover:bg-slate-100 hover:text-slate-700 rounded-lg transition-colors text-sm">إلغاء</button>
                    <button onclick="saveTreatment()"
                        class="px-6 py-2 bg-primary hover:bg-sky-600 text-white rounded-lg shadow-lg shadow-primary/20 transition-all text-sm flex items-center gap-2">
                        <i data-lucide="save" class="w-4 h-4"></i>
                        حفظ وإنهاء
                    </button>
                </div>

            </div>
        </div>
    </div>

    <!-- NOTIFICATION -->
    <div id="toast"
        class="fixed bottom-6 left-6 bg-slate-800 text-white px-4 py-3 rounded-lg shadow-2xl transform translate-y-32 transition-transform duration-300 flex items-center gap-3 z-[100] text-sm font-medium">
        <div class="w-8 h-8 rounded-full bg-green-500 flex items-center justify-center">
            <i data-lucide="check" class="w-5 h-5 text-white"></i>
        </div>
        <div>
            <p>تم حفظ الإجراء بنجاح</p>
            <p class="text-xs text-slate-400">تم خصم المواد من مخزن العيادة</p>
        </div>
    </div>

    <script>
        lucide.createIcons();

        // MOCK DATA
        const inventoryData = {
            'rct': {
                cost: 1200,
                materials: [
                    { name: 'بنج (Lidocaine)', type: 'item', qty: 2, unit: 'أمبول', stock_ok: true },
                    { name: 'Paper Points F2', type: 'item', qty: 4, unit: 'قطعة', stock_ok: true }
                ]
            },
            'composite': {
                cost: 800,
                materials: [
                    { name: 'بنج (Lidocaine)', type: 'item', qty: 1, unit: 'أمبول', stock_ok: true },
                    {
                        name: 'Composite',
                        type: 'multi-batch',
                        unit: 'جرام',
                        qty: 0.2, // Default estimated usage per shade
                        stock_ok: true,
                        batches: [
                            { id: 1, name: '3M Filtek A2 (Open)', expiry: '2026', is_open: true },
                            { id: 2, name: '3M Filtek A3 (Open)', expiry: '2026', is_open: true },
                            { id: 3, name: 'Kerr A1 (New)', expiry: '2025', is_open: false },
                            { id: 4, name: 'Kerr B1 (New)', expiry: '2025', is_open: false }
                        ]
                    }
                ]
            },
            'extraction': {
                cost: 500,
                materials: [
                    { name: 'بنج (Lidocaine)', type: 'item', qty: 2, unit: 'أمبول', stock_ok: true }
                ]
            }
        };

        function openModal() {
            const backdrop = document.getElementById('modal-backdrop');
            const content = document.getElementById('modal-content');
            backdrop.classList.remove('hidden');
            setTimeout(() => {
                backdrop.classList.remove('opacity-0');
                content.classList.remove('scale-95');
                content.classList.add('scale-100');
            }, 10);
        }

        function closeModal() {
            const backdrop = document.getElementById('modal-backdrop');
            const content = document.getElementById('modal-content');
            backdrop.classList.add('opacity-0');
            content.classList.remove('scale-100');
            content.classList.add('scale-95');
            setTimeout(() => {
                backdrop.classList.add('hidden');
            }, 300);
        }

        function handleProcedureChange() {
            const select = document.getElementById('procedure-select');
            const inventorySec = document.getElementById('inventory-section');
            const materialsList = document.getElementById('materials-list');
            const costInput = document.getElementById('cost-input');

            const procedure = select.value;

            if (!procedure) {
                inventorySec.classList.add('hidden');
                costInput.value = "0.00";
                return;
            }

            const data = inventoryData[procedure];
            costInput.value = data.cost.toFixed(2);
            materialsList.innerHTML = '';

            data.materials.forEach(item => renderItem(materialsList, item));
            inventorySec.classList.remove('hidden');
        }

        function renderItem(container, item) {
            const div = document.createElement('div');
            div.className = "p-2 bg-white rounded-lg border border-slate-100 text-xs shadow-sm hover:shadow-md transition-shadow mb-2 group";

            if (item.type === 'multi-batch') {
                // RENDER DROPDOWN FOR BATCHES + ADD SHADE BTN
                let options = item.batches.map(b =>
                    `<option value="${b.id}">${b.name} (${b.expiry}) ${b.is_open ? '✨ مفتوح' : ''}</option>`
                ).join('');

                div.innerHTML = `
                    <div class="flex justify-between items-center mb-1">
                        <div class="font-bold text-slate-800 flex items-center gap-2">
                             <div class="w-1.5 h-1.5 rounded-full bg-purple-500"></div>
                             ${item.name}
                        </div>
                        <div class="flex items-center gap-2">
                            <span class="text-slate-400 font-mono">~${item.qty} ${item.unit}</span>
                            <button onclick="addAnotherShade(this)" class="text-[10px] bg-blue-50 text-blue-600 px-2 py-0.5 rounded border border-blue-100 hover:bg-blue-100 font-bold transition-colors">
                                + إضافة لون آخر
                            </button>
                        </div>
                    </div>
                    <select class="w-full text-[11px] p-1.5 bg-slate-50 border border-slate-200 rounded outline-none text-slate-700 cursor-pointer mb-1 shadow-sm">
                        ${options}
                    </select>
                `;
            } else {
                // RENDER STANDARD ITEM WITH +/-
                div.innerHTML = `
                    <div class="flex justify-between items-center h-full">
                        <div class="flex items-center gap-2">
                            <div class="w-1.5 h-1.5 rounded-full bg-blue-500"></div>
                            <span class="font-bold text-slate-700">${item.name}</span>
                        </div>
                        <div class="flex items-center border rounded bg-slate-50 h-6">
                            <button class="px-2 hover:bg-slate-200 text-slate-600 font-bold h-full flex items-center" onclick="adj(this, -1)">-</button>
                            <span class="px-1.5 font-mono font-bold text-slate-800">${item.qty}</span>
                            <span class="text-[10px] text-slate-400 pr-1">${item.unit}</span>
                            <button class="px-2 hover:bg-slate-200 text-primary font-bold h-full flex items-center" onclick="adj(this, 1)">+</button>
                        </div>
                    </div>
                `;
            }
            container.appendChild(div);
        }

        // Add Another Shade Logic
        window.addAnotherShade = function (btn) {
            // Clone the parent row
            const parent = btn.closest('.group');
            const clone = parent.cloneNode(true);

            // Remove the 'Add Shade' button from the clone (keep it clean, or keep it to add even more?)
            // Let's change the button to a 'Remove' button in the clone to allow deletion.
            const actionBtn = clone.querySelector('button');
            actionBtn.innerText = "× حذف";
            actionBtn.className = "text-[10px] bg-red-50 text-red-600 px-2 py-0.5 rounded border border-red-100 hover:bg-red-100 font-bold transition-colors";
            actionBtn.onclick = function () { this.closest('.group').remove(); };

            // Insert after the current row
            parent.after(clone);
        }

        function toggleManualAdd() {
            const row = document.getElementById('manual-add-row');
            row.classList.toggle('hidden');
        }

        function addManualItem() {
            const select = document.getElementById('manual-item-select');
            const materialsList = document.getElementById('materials-list');
            const name = select.value;

            if (!name) return;
            const item = { name: name, type: 'item', qty: 1, unit: 'قطعة', stock_ok: true };
            renderItem(materialsList, item);
            toggleManualAdd();
            select.value = "";
        }

        window.adj = function (btn, val) {
            const span = btn.parentNode.querySelector('span:not(.text-slate-400)');
            let current = parseInt(span.innerText);
            if (current + val >= 0) span.innerText = current + val;
        }

        function saveTreatment() {
            const toast = document.getElementById('toast');
            toast.classList.remove('translate-y-32');
            setTimeout(() => {
                closeModal();
                toast.classList.add('translate-y-32');
            }, 2000);
        }

        setTimeout(openModal, 500);

    </script>
</body>

</html>
